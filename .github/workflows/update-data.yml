name: Weekly Hospital Price Auto Update

on:
  schedule:
    # Runs at 15:00 UTC (midnight KST) every Sunday
    - cron: '0 15 * * 0'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-hira-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for committing changes back to repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Fetch and update HIRA prices
      env:
        HIRA_API_KEY: ${{ secrets.HIRA_API_KEY }}
      run: node update-data.js

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data.json
        # Only commit and push if data.json actually changed
        if git diff --quiet && git diff --staged --quiet; then
          echo "No changes in HIRA data. Skipping push."
        else
          git commit -m "Auto-update: Weekly HIRA non-reimbursed hospital prices"
          git push
        fi
